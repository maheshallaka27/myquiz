<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz.css" />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Scripting Languages Quiz</h1>
        <p>Answer all questions. You have limited time!</p>
        <div class="top-info">
          <span id="timer">Time: 60s</span>
          <span id="attempted">Attempted: 0</span>
        </div>
      </div>

      <div id="quiz"></div>

      <button onclick="submitQuiz()">Submit Quiz</button>
    </div>

    <script src="quiz.js"></script>
  </body>
</html>
